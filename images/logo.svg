<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" width="168" height="40" role="img" aria-label="nunicorn">
  <!-- Unicorn icon background circle -->
  <circle cx="20" cy="20" r="19" fill="#F3A59B"/>

  <!-- Horn -->
  <polygon points="20,3 16.5,14 23.5,14" fill="#FEE27A"/>
  <line x1="19" y1="5.5" x2="22" y2="12.5" stroke="#F3D68A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17.5" y1="9" x2="20.5" y2="13.5" stroke="#C8E1D4" stroke-width="1" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="11" cy="16" rx="4" ry="5.5" fill="#FFF0EE"/>
  <ellipse cx="11" cy="16" rx="2.3" ry="3.8" fill="#F3A59B"/>
  <ellipse cx="29" cy="16" rx="4" ry="5.5" fill="#FFF0EE"/>
  <ellipse cx="29" cy="16" rx="2.3" ry="3.8" fill="#F3A59B"/>

  <!-- Head -->
  <ellipse cx="20" cy="25" rx="12.5" ry="11" fill="#FFF9F4"/>

  <!-- Eyes -->
  <ellipse cx="15.5" cy="23" rx="2" ry="2.3" fill="#4A413D"/>
  <ellipse cx="24.5" cy="23" rx="2" ry="2.3" fill="#4A413D"/>
  <circle cx="16.2" cy="22.2" r="0.8" fill="white"/>
  <circle cx="25.2" cy="22.2" r="0.8" fill="white"/>

  <!-- Cheeks -->
  <ellipse cx="11.5" cy="26.5" rx="3.5" ry="2.2" fill="#F3A59B" opacity="0.55"/>
  <ellipse cx="28.5" cy="26.5" rx="3.5" ry="2.2" fill="#F3A59B" opacity="0.55"/>

  <!-- Smile -->
  <path d="M16.5 28.5 Q20 32 23.5 28.5" stroke="#4A413D" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Rainbow mane (left side) -->
  <path d="M8 17 Q2 24 6 31 Q9 36 15 35" stroke="#E8847A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M8 17 Q1 25 5.5 32 Q9 37 15 36" stroke="#F3D68A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M8 17 Q2 26 6 33" stroke="#C8E1D4" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- "nunicorn" wordmark -->
  <text
    x="48"
    y="28"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="23"
    font-weight="800"
    fill="#62534D"
    letter-spacing="-0.8"
  >nunicorn</text>
</svg>
